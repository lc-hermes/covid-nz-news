name: CI

on:
  push:
    branches: [main, improvements-covid-timeline]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.4.17'
      
      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
      
      - name: Run ruff
        run: |
          source .venv/bin/activate
          uv run ruff check .
      
      # - name: Run ty (disabled - too strict for Polars types)
        # run: |
        #   source .venv/bin/activate
        #   uv run ty check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.4.17'
      
      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
      
      - name: Run pytest
        run: |
          source .venv/bin/activate
          uv run pytest -v --tb=short --cov=. --cov-report=xml --cov-report=term
      
      - name: Upload coverage report (optional)
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
