[mypy]
python_version = 3.10
warn_return_any = false
warn_unused_configs = true
ignore_missing_imports = false
disable_error_code = attr-defined,import-untyped,var-annotated,assignment

# Exclude test files and cache
exclude = (tests/|__pycache__/|\.venv/)

# Polars has incomplete type stubs, so we need to be lenient
[mypy-polars.*]
ignore_missing_imports = true

[mypy-deltalake.*]
ignore_missing_imports = true

[mypy-langdetect.*]
ignore_missing_imports = true

[mypy-readability.*]
ignore_missing_imports = true

[mypy-warcio.*]
ignore_missing_imports = true

[mypy-datasets.*]
ignore_missing_imports = true

[mypy-tqdm.*]
ignore_missing_imports = true
